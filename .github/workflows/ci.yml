# CI de ADS Veris (Fase 10 §16.4): en cada push/PR corre los tests del motor
# de datos, la auditoría del diccionario (incluida en pytest) y el build del
# frontend con chequeo de tipos. Si algo se rompe, el commit no pasa.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: API — pytest (motor, seguridad y diccionario)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  frontend:
    name: Frontend — tipos y build de producción
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Fase 14b: Vitest — paridad del RUT con el backend y meses parciales
      - run: npm run test
      - run: npm run build

  e2e:
    name: E2E — Playwright Chromium
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: pip install -r api/requirements.txt -r api/requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7

  seguridad:
    name: Seguridad — dependencias vulnerables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Fase 15: dependencias con vulnerabilidades CONOCIDAS bloquean el CI.
      # pip-audit revisa api/requirements.txt; npm audit el lockfile (solo
      # severidad high+ para no bloquear por ruido de advisories menores).
      - run: pip install pip-audit
      - run: pip-audit -r api/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm audit --audit-level=high
