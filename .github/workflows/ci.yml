# CI de ADS Veris (Fase 10 §16.4): en cada push/PR corre los tests del motor
# de datos, la auditoría del diccionario (incluida en pytest) y el build del
# frontend con chequeo de tipos. Si algo se rompe, el commit no pasa.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: API — pytest (motor, seguridad y diccionario)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  frontend:
    name: Frontend — tipos y build de producción
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Fase 14b: Vitest — paridad del RUT con el backend y meses parciales
      - run: npm run test
      - run: npm run build
